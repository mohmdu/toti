<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram - hyper-réaliste</title>
    <!-- استيراد الأيقونات من Remix Icon - تشبه أيقونات إنستغرام الأصلية -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #262626;
            --gray-text: #8e8e8e;
            --border-color: #dbdbdb;
            --blue-link: #0095f6;
            --story-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* إزالة التظليل عند الضغط في الهاتف */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
            overflow-x: hidden;
            padding-top: 24px; /* مساحة لـ Status Bar */
            padding-bottom: 55px; /* مساحة لـ Bottom Nav */
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        button { border: none; background: none; font-size: inherit; cursor: pointer; }

        /* --- شريط الحالة (تلفون) - اختيارية للواقعية القصوى --- */
        .status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 24px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1001;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-bar .right-icons {
            display: flex;
            gap: 5px;
        }

        /* --- الـ Header --- */
        .main-header {
            position: fixed;
            top: 24px; /* تحت الـ status bar */
            width: 100%;
            height: 50px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .insta-logo {
            height: 30px;
            cursor: pointer;
        }

        .header-icons {
            display: flex;
            gap: 22px;
        }

        .header-icons i {
            font-size: 24px;
            color: #000;
        }

        /* --- القصص (Stories) --- */
        .stories-container {
            display: flex;
            padding: 10px 0 12px 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
            scroll-behavior: smooth;
        }

        .stories-container::-webkit-scrollbar { display: none; } /* إخفاء شريط التمرير */

        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 82px;
            gap: 6px;
            cursor: pointer;
        }

        /* حلقة القصة (الگرادينت الملون) */
        .story-avatar {
            width: 70px;
            height: 70px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .story.has-story .story-avatar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--story-gradient);
            border-radius: 50%;
            z-index: 1;
        }

        /* الصورة نفسها */
        .story-avatar img {
            width: calc(100% - 6px); /* مسافة للحلقة */
            height: calc(100% - 6px);
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #fff; /* خلفية بيضاء تحت الگرادينت */
            position: relative;
            z-index: 2;
        }

        /* قصة خاصة بي (Votre story) */
        .story.my-story .story-avatar::before {
            background: none; /* لا يوجد گرادينت */
        }

        .story.my-story .story-avatar img {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* أيقونة + الأزرق */
        .story.my-story .add-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0095f6;
            color: white;
            width: 21px;
            height: 21px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            z-index: 3;
        }

        /* حالة القصة تمت مشاهدتها */
        .story.seen .story-avatar::before {
            background: #dbdbdb;
        }

        .story span {
            font-size: 11.5px;
            color: var(--text-color);
            text-align: center;
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- البوست (Post) --- */
        .post {
            width: 100%;
            margin-top: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* الهيدر تاع البوست */
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-info img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-details .author-name {
            font-weight: 600;
            font-size: 13.5px;
        }

        .author-details .post-time {
            font-size: 11.5px;
            color: var(--gray-text);
            margin-top: 1px;
        }

        .post-header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .suivre-btn {
            background: #efefef;
            color: var(--text-color);
            padding: 5px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        /* محتوى الصورة */
        .post-content img {
            width: 100%;
            height: 100%; /* يجب أن يكون البوست طويل */
            max-height: 80vh; /* تحديد الطول ليكون واقعي */
            object-fit: cover;
            display: block;
        }

        /* أكشن بار البوست (اللايك، التعليق...) */
        .post-actions {
            padding: 12px 14px 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .post-actions i {
            font-size: 24px;
            cursor: pointer;
        }

        .i-red { color: #ed4956; } /* لون القلب */

        /* تفاصيل البوست */
        .post-details {
            padding: 0 14px 15px 14px;
            font-size: 13.5px;
            line-height: 1.4;
        }

        .likes-count {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .caption .username {
            font-weight: 600;
            margin-right: 5px;
        }

        .comments-link {
            color: var(--gray-text);
            margin-top: 5px;
            display: block;
        }

        /* --- بار التنقل السفلي (Bottom Nav) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 55px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
            padding-bottom: 5px; /* مسافة لـ iPhone notch */
        }

        .nav-item {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 20%;
            height: 100%;
        }

        .nav-item i {
            font-size: 25px;
            color: #000;
        }

        .nav-profile {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #ddd;
            border: 2px solid #000; /* تحديد البروفايل النشط */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .nav-profile img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

    </style>
</head>
<body>

    <!-- شريط حالة الهاتف (لإضافة الواقعية في العرض) -->
    <div class="status-bar">
        <span>14:02</span>
        <div class="right-icons">
            <i class="ri-signal-tower-fill"></i>
            <i class="ri-wifi-fill"></i>
            <i class="ri-battery-fill"></i>
        </div>
    </div>

    <!-- الهيدر الرئيسي -->
    <header class="main-header">
        <!-- لوغو إنستغرام الأصلي SVG -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Instagram_logo.svg" alt="Instagram Logo" class="insta-logo">
        <div class="header-icons">
            <a href="#"><i class="ri-heart-3-line"></i></a>
            <a href="#"><i class="ri-messenger-line"></i></a>
        </div>
    </header>

    <!-- منطقة القصص (Stories) -->
    <div class="stories-container">
        <!-- قصة خاصة بي -->
        <div class="story my-story seen">
            <div class="story-avatar">
                <img src="https://api.dicebear.com/8.x/initials/svg?seed=Me" alt="My Profile">
                <div class="add-btn"><i class="ri-add-fill"></i></div>
            </div>
            <span>Votre story</span>
        </div>

        <!-- قصة مستخدم 1 -->
        <div class="story has-story" onclick="this.classList.toggle('seen')">
            <div class="story-avatar">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?&w=150&h=150&q=80&fm=jpg&crop=faces&fit=crop" alt="User 1">
            </div>
            <span>sarah__m.h</span>
        </div>

        <!-- قصة مستخدم 2 -->
        <div class="story has-story seen" onclick="this.classList.toggle('seen')">
            <div class="story-avatar">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?&w=150&h=150&q=80&fm=jpg&crop=faces&fit=crop" alt="User 2">
            </div>
            <span>lmbrkbnmws</span>
        </div>
        
        <!-- قصة مستخدم 3 -->
        <div class="story has-story" onclick="this.classList.toggle('seen')">
            <div class="story-avatar">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?&w=150&h=150&q=80&fm=jpg&crop=faces&fit=crop" alt="User 3">
            </div>
            <span>d___hl_v2</span>
        </div>
    </div>

    <!-- منشور (Post) -->
    <div class="post">
        <!-- هيدر المنشور -->
        <div class="post-header">
            <div class="author-info">
                <!-- صورة بروفايل japoni_mens -->
                <img src="https://images.unsplash.com/photo-1628157588553-5eeea00af15c?&w=150&h=150&q=80&fm=jpg&crop=faces&fit=crop" alt="japoni_mens">
                <div class="author-details">
                    <p class="author-name">japoni_mens</p>
                    <p class="post-time">il y a 4 jours •</p>
                </div>
            </div>
            <div class="post-header-actions">
                <button class="suivre-btn">Suivre</button>
                <i class="ri-more-2-fill"></i>
            </div>
        </div>
        
        <!-- صورة المنشور الرئيسي -->
        <div class="post-content">
            <!-- استبدلت صورة المتجر بصورة واقعية عالية الجودة من Unsplash لتبدو أجمل -->
            <img src="https://images.unsplash.com/photo-1552346154-21d32810abb3?q=80&w=600&auto=format&fit=crop" alt="Sneakers Collection">
        </div>
        
        <!-- أزرار التفاعل (الأكشن بار) -->
        <div class="post-actions">
            <div class="left-actions">
                <i class="ri-heart-3-fill i-red"></i> <!-- قلب أحمر تفاعلي -->
                <i class="ri-chat-3-line"></i>
                <i class="ri-send-plane-line"></i>
            </div>
            <i class="ri-bookmark-line"></i>
        </div>

        <!-- تفاصيل المنشور والتعليقات -->
        <div class="post-details">
            <p class="likes-count">1 342 J'aime</p>
            <p class="caption">
                <span class="username">japoni_mens</span>
                Nouvelle collection de sneakers disponible ! 🔥 #japoni #mensfashion #sneakers
            </p>
            <a href="#" class="comments-link">Afficher les 87 commentaires</a>
        </div>
    </div>

    <!-- شريط التنقل السفلي -->
    <div class="bottom-nav">
        <a href="#" class="nav-item"><i class="ri-home-5-fill"></i></a> <!-- أيقونة الرئيسة مليئة (نشطة) -->
        <a href="#" class="nav-item"><i class="ri-search-line"></i></a>
        <a href="#" class="nav-item"><i class="ri-add-box-line"></i></a>
        <a href="#" class="nav-item"><i class="ri-clapperboard-line"></i></a>
        <a href="#" class="nav-item">
            <div class="nav-profile">
                <img src="https://api.dicebear.com/8.x/initials/svg?seed=Me" alt="My Profile">
            </div>
        </a>
    </div>

</body>
</html>
